name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: multi-model-chat

jobs:
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: multi-model-chat/frontend/package-lock.json
      - name: Install & build
        working-directory: multi-model-chat/frontend
        run: |
          npm ci
          npm run build
      # Ship the built SPA as the deploy artifact so the app container starts pre-built
      # (app.yaml no longer builds at boot).
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: multi-model-chat/frontend/dist

  backend:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  bundle:
    name: Validate bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      # Requires DATABRICKS_HOST + DATABRICKS_TOKEN (or OIDC) configured as repo secrets.
      - name: databricks bundle validate
        working-directory: multi-model-chat
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate
